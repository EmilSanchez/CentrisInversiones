<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo rojo redondeado -->
  <rect width="32" height="32" rx="7" fill="#DC2626"/>

  <!-- Gráfica de barras crecientes (tendencia alcista) -->
  <rect x="5" y="20" width="4" height="7" rx="1" fill="white" opacity="0.9"/>
  <rect x="11" y="15" width="4" height="12" rx="1" fill="white" opacity="0.9"/>
  <rect x="17" y="10" width="4" height="17" rx="1" fill="white" opacity="0.9"/>
  <rect x="23" y="5" width="4" height="22" rx="1" fill="white"/>

  <!-- Flecha hacia arriba en la esquina superior derecha -->
  <polyline points="19,4 25,4 25,10" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="14" y1="9" x2="24.5" y2="4.5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
</svg>
